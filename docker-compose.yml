version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gaffer
      POSTGRES_USER: gaffer
      POSTGRES_PASSWORD: gaffer_pw
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gaffer']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://gaffer:gaffer_pw@db:5432/gaffer
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3001:3001'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  pgdata:
